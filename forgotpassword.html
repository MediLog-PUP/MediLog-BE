<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MediLog</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Config for PUP Colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        pup: {
                            maroon: '#880000',
                            maroonDark: '#660000',
                            gold: '#F1B500',
                            goldLight: '#FDE68A',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Page Transition Styles -->
    <style>
        body {
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .page-exit {
            animation: fadeOut 0.3s ease-in forwards !important;
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>
<body class="font-sans antialiased text-gray-800 min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative">

    <!-- Background Image & Overlay -->
    <div class="fixed inset-0 bg-[url('https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80')] bg-cover bg-center z-0"></div>
    <div class="fixed inset-0 bg-gradient-to-br from-pup-maroonDark/95 via-pup-maroon/90 to-gray-900/95 backdrop-blur-sm z-0"></div>

    <!-- Main Card -->
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl border border-gray-100 p-8 sm:p-10 relative overflow-hidden z-10">
        <!-- Decorative Top Border -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-pup-maroon via-pup-maroonDark to-pup-gold"></div>

        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center bg-red-50 text-pup-maroon p-4 rounded-full mb-5 shadow-sm border border-red-100">
                <i data-lucide="key-round" class="h-8 w-8"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-gray-900 mb-2">Forgot Password?</h2>
            <p class="text-sm text-gray-500 leading-relaxed">
                No worries! Enter your registered Student or Employee ID, and we'll send you instructions to reset your password securely.
            </p>
        </div>

        <!-- Form -->
        <form action="#" method="POST" class="space-y-6">
            <div>
                <label for="user-id" class="block text-sm font-medium text-gray-700 mb-2">ID Number or Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="mail" class="h-5 w-5 text-gray-400"></i>
                    </div>
                    <input type="text" id="user-id" name="user-id" class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:ring-pup-maroon focus:border-pup-maroon sm:text-sm transition-colors" placeholder="e.g. 2021-00000-MN-0 or Email" required>
                </div>
            </div>

            <button type="submit" class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-pup-maroon hover:bg-pup-maroonDark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pup-maroon transition-all transform hover:-translate-y-0.5">
                Send Reset Link
                <i data-lucide="send" class="ml-2 h-4 w-4"></i>
            </button>
        </form>

        <!-- Back to Login Navigation -->
        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <a href="index.html" class="inline-flex items-center text-sm font-medium text-gray-500 hover:text-pup-maroon transition-colors group">
                <div class="bg-gray-100 p-1.5 rounded-full mr-2 group-hover:bg-red-50 transition-colors">
                    <i data-lucide="arrow-left" class="h-4 w-4 text-gray-500 group-hover:text-pup-maroon transition-colors"></i>
                </div>
                Back to Role Selection
            </a>
        </div>
    </div>

    <!-- Initialization Scripts -->
    <script>
        // Render Icons
        lucide.createIcons();

        // Page Transition Logic
        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('a[href]');
            links.forEach(link => {
                link.addEventListener('click', e => {
                    const href = link.getAttribute('href');
                    // Skip transition for hashes, new tabs, or empty links
                    if (!href || href.startsWith('#') || link.getAttribute('target') === '_blank') return;
                    
                    e.preventDefault();
                    document.body.classList.add('page-exit');
                    setTimeout(() => {
                        window.location.href = href;
                    }, 250); // Navigate right before animation fully ends
                });
            });
        });
    </script>
</body>
</html>
